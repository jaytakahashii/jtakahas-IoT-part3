apiVersion: apps/v1
kind: Deployment
metadata:
  name: jtakahas
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jtakahas
  template:
    metadata:
      labels:
        app: jtakahas
    spec:
      containers:
        - name: jtakahas
          image: wil42/playground:v1
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: jtakahas-service
  namespace: dev
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8888
  selector:
    app: jtakahas
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: playground-ingress
  namespace: dev
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false" # HTTPでアクセスする場合に必要
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jtakahas-service
                port:
                  number: 80
