apiVersion: apps/v1
kind: Deployment
metadata:
  name: jtakahas
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jtakahas
  template:
    metadata:
      labels:
        app: jtakahas
    spec:
      containers:
        - name: jtakahas
          image: wil/playground:v1
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: jtakahas-service
  namespace: dev
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8888
  selector:
    app: jtakahas
